<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pond Hockey Insult Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== CHARACTER SELECT ===================== -->
    <div id="character-select">
        <h1 class="cs-title">CHOOSE YOUR FIGHTERS</h1>
        <div class="cs-arena">

            <div class="cs-picker" id="cs-p1">
                <div class="cs-player-label">PLAYER 1</div>
                <div class="cs-controls-hint">Keys: A / D</div>
                <div class="cs-carousel">
                    <button class="cs-arrow" id="p1-prev">&#9664;</button>
                    <div class="cs-character-display">
                        <div class="cs-sprite-wrap" id="p1-sprite"></div>
                        <div class="cs-char-name"    id="p1-char-name"></div>
                        <div class="cs-char-tagline" id="p1-char-tagline"></div>
                    </div>
                    <button class="cs-arrow" id="p1-next">&#9654;</button>
                </div>
                <div class="cs-dots" id="p1-dots"></div>
            </div>

            <div class="cs-vs">VS</div>

            <div class="cs-picker" id="cs-p2">
                <div class="cs-player-label">PLAYER 2</div>
                <div class="cs-controls-hint">Keys: &#9664; / &#9654;</div>
                <div class="cs-carousel">
                    <button class="cs-arrow" id="p2-prev">&#9664;</button>
                    <div class="cs-character-display">
                        <div class="cs-sprite-wrap" id="p2-sprite"></div>
                        <div class="cs-char-name"    id="p2-char-name"></div>
                        <div class="cs-char-tagline" id="p2-char-tagline"></div>
                    </div>
                    <button class="cs-arrow" id="p2-next">&#9654;</button>
                </div>
                <div class="cs-dots" id="p2-dots"></div>
            </div>

        </div>
        <button class="game-button cs-start-btn" id="cs-start">START GAME</button>
    </div>

    <!-- ======================== GAME SCREEN ======================== -->
    <div class="game-container" id="game-screen" style="display:none">

        <!-- Health Bars -->
        <div class="health-bars">
            <div class="health-bar-container left">
                <div class="player-name" id="player1-name">Player 1</div>
                <div class="health-bar-border">
                    <div class="health-bar" id="player1-health"></div>
                </div>
            </div>

            <div class="round-counter">RND <span id="round-number">1</span></div>

            <div class="health-bar-container right">
                <div class="player-name" id="player2-name">Player 2</div>
                <div class="health-bar-border">
                    <div class="health-bar" id="player2-health"></div>
                </div>
            </div>
        </div>

        <!-- Main Game Area -->
        <div class="game-area">

            <!-- Characters + Insult Bubble -->
            <div class="characters">
                <div class="character left" id="character1">
                    <div class="pbox">
                        <div class="pbox-pipe-h"></div>
                        <div class="pbox-glass-area">
                            <div class="pbox-glare"></div>
                            <div class="pbox-fog" id="p1-fog"></div>
                            <div class="character-sprite"></div>
                        </div>
                        <div class="pbox-pipe-h"></div>
                        <div class="pbox-boards"><span class="pbox-label">PENALTY BOX</span></div>
                    </div>
                </div>

                <div class="center-display">
                    <div class="insult-bubble">
                        <div class="current-insult" id="current-insult">
                            Select words to build your insult!
                        </div>
                    </div>
                    <div class="damage-indicator" id="damage-indicator"></div>
                </div>

                <div class="character right" id="character2">
                    <div class="pbox">
                        <div class="pbox-pipe-h"></div>
                        <div class="pbox-glass-area">
                            <div class="pbox-glare"></div>
                            <div class="pbox-fog" id="p2-fog"></div>
                            <div class="character-sprite"></div>
                        </div>
                        <div class="pbox-pipe-h"></div>
                        <div class="pbox-boards"><span class="pbox-label">PENALTY BOX</span></div>
                    </div>
                </div>
            </div>

            <!-- Word Selection -->
            <div class="word-selection-area">
                <div class="available-words" id="available-words"></div>
                <div class="action-buttons">
                    <button class="game-button" id="finish-insult-btn">Fire!</button>
                    <button class="game-button secondary" id="reset-btn">Reset</button>
                </div>
            </div>

        </div>

        <!-- Turn Indicator -->
        <div class="turn-indicator">
            <span id="current-turn"></span>'s turn to chirp
        </div>

    </div>

    <!-- ====================== GAME OVER OVERLAY ====================== -->
    <div id="game-over-overlay" style="display:none">
        <div class="game-over-box">
            <div class="go-ko">K.O.!</div>
            <div class="go-winner" id="go-winner-text"></div>
            <div class="go-subtitle">WINS THE CHIRP-OFF</div>
            <div class="go-buttons">
                <button class="game-button"           id="go-rematch-btn">REMATCH</button>
                <button class="game-button secondary" id="go-menu-btn">MENU</button>
            </div>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="characters.js"></script>
    <script src="game.js"></script>
</body>
</html>
